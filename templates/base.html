<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vulcaria{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <div class="header-left">
        <a href="/" class="logo">Vulcaria</a>
        <nav>
            <div class="nav-item">
                <a href="#">Catálogo</a>
                <div class="dropdown">
                    <a href="#">Anillos</a>
                    <a href="#">Aretes</a>
                    <a href="#">Collares</a>
                    <a href="#">Pulseras</a>
                </div>
            </div>
            <div class="nav-item">
                <a href="/sobre-nosotros">Sobre Nosotros</a>
                <div class="dropdown">
                    <a href="/sobre-nosotros">Quiénes somos</a>
                    <a href="#">Servicios</a>
                </div>
            </div>
        </nav>
    </div>
    <div class="header-right">
        <a href="#" class="icon-btn" title="Iniciar sesión">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <a href="#" class="icon-btn" title="Carrito">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <button class="theme-btn icon-btn" id="themeToggle" title="Cambiar tema">
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</header>

{% block content %}{% endblock %}

<script src="/static/app.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
