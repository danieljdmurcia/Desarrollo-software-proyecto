<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vulcaria{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <div class="header-left">
        <a href="/" class="logo">Vulcaria</a>
        <nav>
            <div class="nav-item">
                <a href="/catalogo">Catálogo</a>
                <div class="dropdown">
                    <a href="/catalogo?categoria=anillos">Anillos</a>
                    <a href="/catalogo?categoria=aretes">Aretes</a>
                    <a href="/catalogo?categoria=collares">Collares</a>
                    <a href="/catalogo?categoria=pulseras">Pulseras</a>
                </div>
            </div>
            <div class="nav-item">
                <a href="/sobre-nosotros">Sobre Nosotros</a>
                <div class="dropdown">
                    <a href="/sobre-nosotros">Quiénes somos</a>
                    <a href="/servicios">Servicios</a>
                </div>
            </div>
        </nav>
    </div>
    <div class="header-right">

        <!-- Botón Panel Admin (solo visible para @vulcaria) -->
        <a href="/admin" class="icon-btn" id="btn-admin-panel"
           style="display:none; align-items:center; gap:5px; font-size:0.8rem;
                  font-family:'Poppins',sans-serif; color:#c9a84c; border:1px solid #c9a84c;
                  border-radius:6px; padding:4px 10px; margin-right:6px;"
           title="Panel de administración">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0
                         2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0
                         1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0
                         0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0
                         0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0
                         0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0
                         0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0
                         0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07
                         2.572-1.065z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            Admin
        </a>

        <div class="nav-item" id="nav-login">
            <a href="/login" class="icon-btn" id="btn-login">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
                     viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span id="label-login" style="font-size:0.8rem; font-family:'Poppins',sans-serif; margin-left:5px;">Iniciar sesión</span>
            </a>
            <div class="dropdown" id="dropdown-sesion" style="display:none;">
                <a href="#" id="btn-cerrar-sesion" style="color:#e07070;">Cerrar sesión</a>
            </div>
        </div>

        <a href="#" class="icon-btn" title="Carrito" onclick="if(typeof openCartPanel==='function'){event.preventDefault();openCartPanel();}" style="position:relative;">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
            <span id="cartBadge" style="display:none; position:absolute; top:-6px; right:-6px;
                  background:#c9a84c; color:#1c1015; font-size:10px; font-weight:700;
                  width:18px; height:18px; border-radius:50%;
                  align-items:center; justify-content:center;">0</span>
        </a>

        <button class="theme-btn icon-btn" id="themeToggle" title="Cambiar tema">
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" style="display:none">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</header>

{% block content %}{% endblock %}

<script src="/static/app.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
