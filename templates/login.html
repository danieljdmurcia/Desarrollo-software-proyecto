{% extends "base.html" %}
{% block title %}Iniciar Sesión — Vulcaria{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="/static/login.css">
{% endblock %}
{% block content %}

<div class="login-modal active" id="loginModal">
    <div class="login-cubes">
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
    </div>

    <div class="login-container">

        <div class="wrapper">
            <div class="card-switch">
                <label class="switch">
                    <input type="checkbox" class="toggle" id="toggleCard">
                    <span class="slider"></span>
                    <span class="card-side"></span>
                    <div class="flip-card__inner">

                        <!-- LOGIN -->
                        <div class="flip-card__front">
                            <div class="flip-card__title">Iniciar Sesión</div>
                            <div class="flip-card__form">
                                <input class="flip-card__input" id="login-email" placeholder="Correo electrónico" type="email">
                                <input class="flip-card__input" id="login-password" placeholder="Contraseña" type="password">
                                <span class="flip-card__error" id="login-error"></span>
                                <button class="flip-card__btn" onclick="iniciarSesion()">Entrar</button>
                                <button class="flip-card__link" onclick="mostrarRecuperar()">¿Olvidaste tu contraseña?</button>
                                <button class="btn-salir" onclick="window.location.href='/'">Salir</button>
                            </div>
                        </div>

                        <!-- REGISTRO -->
                        <div class="flip-card__back">
                            <div class="flip-card__title">Registrarse</div>
                            <div class="flip-card__form">
                                <input class="flip-card__input" id="reg-nombre" placeholder="Nombre completo" type="text">
                                <input class="flip-card__input" id="reg-usuario" placeholder="Nombre de usuario" type="text">
                                <input class="flip-card__input" id="reg-email" placeholder="Correo electrónico" type="email">
                                <input class="flip-card__input" id="reg-password" placeholder="Contraseña (mín. 8 caracteres)" type="password">
                                <span class="flip-card__error" id="reg-error"></span>
                                <span class="flip-card__success" id="reg-success"></span>
                                <button class="flip-card__btn" onclick="registrarse()">Confirmar</button>
                                <button class="btn-salir" onclick="window.location.href='/'">Salir</button>
                            </div>
                        </div>
                            </div>
                        </div>

                    </div>
                </label>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    async function iniciarSesion() {
        const email    = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const error    = document.getElementById("login-error");
        error.style.display = "none";

        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("usuario", JSON.stringify(data.usuario));

            // Si es admin @vulcaria → ir al panel de administración
            if (data.usuario.es_admin) {
                window.location.href = "/admin";
            } else {
                window.history.back();
            }
        } else {
            error.textContent = "Correo o contraseña incorrectos. Verifica tus datos.";
            error.style.display = "block";
        }
    }

    async function registrarse() {
        // ── Leer valores PRIMERO (bug original: se usaban antes de declarar) ──
        const nombre   = document.getElementById("reg-nombre").value.trim();
        const usuario  = document.getElementById("reg-usuario").value.trim();
        const email    = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const error    = document.getElementById("reg-error");
        const success  = document.getElementById("reg-success");

        error.style.display   = "none";
        success.style.display = "none";

        // Validaciones
        if (!nombre) {
            error.textContent = "El nombre no puede estar vacío.";
            error.style.display = "block";
            return;
        }
        if (!/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(nombre)) {
            error.textContent = "El nombre solo puede tener letras.";
            error.style.display = "block";
            return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            error.textContent = "Ingresa un correo válido con @ y dominio.";
            error.style.display = "block";
            return;
        }
        if (password.length < 8) {
            error.textContent = "La contraseña debe tener al menos 8 caracteres.";
            error.style.display = "block";
            return;
        }

        const res = await fetch("/api/auth/registro", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, usuario, email, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("usuario", JSON.stringify(data.usuario));
            success.textContent = "¡Cuenta creada! Redirigiendo...";
            success.style.display = "block";

            // Si registró con @vulcaria → ir directo al admin
            setTimeout(() => {
                if (data.usuario.es_admin) {
                    window.location.href = "/admin";
                } else {
                    window.history.back();
                }
            }, 1500);
        } else {
            const data = await res.json();
            error.textContent = typeof data.detail === "string"
                ? data.detail
                : "El usuario o correo ya existe.";
            error.style.display = "block";
        }
    }

    function mostrarRecuperar() {
        const email = prompt("Ingresa tu correo para recuperar tu contraseña:");
        if (!email) return;
        fetch("/api/auth/recuperar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        }).then(() => {
            alert("Si el correo existe, recibirás un enlace de recuperación.");
        });
    }
</script>
{% endblock %}
